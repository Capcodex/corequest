services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: corequest-app
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      SANDBOX_SERVICE_URL: "http://sandbox-service:4000"
    volumes:
      - .:/app
      - corequest_app_node_modules:/app/node_modules
    depends_on:
      - sandbox-service

  sandbox-service:
    build:
      context: ./sandbox-service
      dockerfile: Dockerfile
    container_name: corequest-sandbox-service
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
    volumes:
      - ./sandbox-service:/app
      - corequest_sandbox_node_modules:/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  corequest_app_node_modules:
  corequest_sandbox_node_modules:
